<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gatos Neon Flutuantes</title>
    <style>
        body {
            background-color: #0A1628;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        /* Estilização do Gato (SVG) */
        .cat {
            position: absolute;
            width: 150px;
            filter: drop-shadow(0 0 15px rgba(0, 212, 200, 0.6));
        }

        /* Gato 1 - Flutuando */
        .cat-1 {
            top: 50px;
            left: 30px;
            animation: float 4s ease-in-out infinite;
        }

        /* Gato 2 - Flutuando e Inclinado */
        .cat-2 {
            bottom: 50px;
            right: 30px;
            transform: rotate(20deg);
            animation: float 5s ease-in-out infinite reverse;
        }

        /* Animação de flutuar e brilhar */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
                filter: drop-shadow(0 0 10px rgba(0, 212, 200, 0.5));
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
                filter: drop-shadow(0 0 25px rgba(0, 212, 200, 0.9));
            }
        }

        /* Brilho nos olhos */
        .eyes {
            fill: #39FF14;
            animation: blink 3s infinite;
        }

        @keyframes blink {

            0%,
            90%,
            100% {
                opacity: 1;
            }

            95% {
                opacity: 0.1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <svg class="cat cat-1" viewBox="0 0 200 200">
            <defs>
                <radialGradient id="grad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#00D4C8" />
                    <stop offset="100%" style="stop-color:#00A8B4" />
                </radialGradient>
            </defs>
            <circle cx="100" cy="140" r="45" fill="url(#grad)" />
            <circle cx="100" cy="80" r="40" fill="url(#grad)" />
            <path d="M70,60 L80,30 L95,60 Z" fill="url(#grad)" />
            <path d="M130,60 L120,30 L105,60 Z" fill="url(#grad)" />
            <circle class="eyes" cx="85" cy="80" r="6" />
            <circle class="eyes" cx="115" cy="80" r="6" />
            <path d="M140,140 Q170,120 160,90" stroke="url(#grad)" stroke-width="6" fill="none"
                stroke-linecap="round" />
        </svg>

        <svg class="cat cat-2" viewBox="0 0 200 200">
            <use href="#grad" />
            <circle cx="100" cy="140" r="45" fill="url(#grad)" />
            <circle cx="100" cy="80" r="40" fill="url(#grad)" />
            <path d="M70,60 L80,30 L95,60 Z" fill="url(#grad)" />
            <path d="M130,60 L120,30 L105,60 Z" fill="url(#grad)" />
            <circle class="eyes" cx="85" cy="80" r="6" />
            <circle class="eyes" cx="115" cy="80" r="6" />
            <path d="M140,140 Q170,120 160,90" stroke="url(#grad)" stroke-width="6" fill="none"
                stroke-linecap="round" />
        </svg>
    </div>

</body>

</html>
